<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Banaras Kali Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="bg-gray-100 flex min-h-screen">

    <div class="w-64 bg-[#5A0A0A] text-white p-6">
        <h2 class="text-xl font-bold mb-10 border-b border-red-900 pb-4">Sansthan Admin</h2>
        <div class="space-y-4">
            <button onclick="show('dashboard')" class="w-full text-left p-2 hover:bg-red-900 rounded">Dashboard</button>
            <button onclick="show('verification')" class="w-full text-left p-2 hover:bg-red-900 rounded">Verification Queue</button>
            <button onclick="show('cashEntry')" class="w-full text-left p-2 hover:bg-red-900 rounded">Manual Cash Entry</button>
            <hr class="border-red-900 my-4">
            <button onclick="location.href='index.html'" class="w-full text-left p-2 text-red-300">Logout</button>
        </div>
    </div>

    <div class="flex-1 p-8">
        <div id="dashboard" class="page">
            <h1 class="text-2xl font-bold mb-6">Financial Overview</h1>
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow"><p class="text-xs text-gray-500 uppercase">Received</p><h3 id="statReceived" class="text-2xl font-bold text-green-600">₹0</h3></div>
                <div class="bg-white p-6 rounded-lg shadow"><p class="text-xs text-gray-500 uppercase">Pending</p><h3 id="statPending" class="text-2xl font-bold text-yellow-600">₹0</h3></div>
                <div class="bg-white p-6 rounded-lg shadow"><p class="text-xs text-gray-500 uppercase">Total Count</p><h3 id="statCount" class="text-2xl font-bold">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow w-96"><canvas id="myChart"></canvas></div>
        </div>

        <div id="verification" class="page hidden">
            <h1 class="text-2xl font-bold mb-6">Pending Verifications</h1>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full text-left"><thead class="bg-gray-100"><tr><th class="p-4">Donor</th><th class="p-4">Amount</th><th class="p-4">Mode</th><th class="p-4">Action</th></tr></thead><tbody id="queueBody"></tbody></table>
            </div>
        </div>

        <div id="cashEntry" class="page hidden">
            <h1 class="text-2xl font-bold mb-6">Manual Cash Receipt</h1>
            <form id="cashForm" class="bg-white p-6 rounded-lg shadow w-full max-w-md space-y-4">
                <input type="text" id="cName" placeholder="Donor Name" class="w-full p-2 border rounded" required>
                <input type="text" id="cPlace" placeholder="Location/Place" class="w-full p-2 border rounded" required>
                <input type="number" id="cAmt" placeholder="Amount" class="w-full p-2 border rounded" required>
                <select id="cCat" class="w-full p-2 border rounded">
                    <option>Gurukul</option><option>Gaushala</option><option>Kanyadaan</option><option>Temple</option>
                </select>
                <button type="submit" class="w-full bg-green-700 text-white p-2 rounded">Save & Print Receipt</button>
            </form>
        </div>
    </div>

    <script>
        if (prompt("Enter Password:") !== "Kalibadi@2026") location.href = "index.html";
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        
        async function fetchData() {
            const { data } = await supabaseClient.from('donations').select('*');
            const verified = data.filter(d => d.is_verified);
            const pending = data.filter(d => !d.is_verified);
            
            document.getElementById('statReceived').innerText = "₹" + verified.reduce((a,b) => a + Number(b.amount), 0).toLocaleString();
            document.getElementById('statPending').innerText = "₹" + pending.reduce((a,b) => a + Number(b.amount), 0).toLocaleString();
            document.getElementById('statCount').innerText = data.length;

            const tbody = document.getElementById('queueBody');
            pending.forEach(d => {
                tbody.innerHTML += `<tr><td class="p-4">${d.donor_name}</td><td class="p-4">₹${d.amount}</td><td class="p-4">${d.payment_mode}</td><td class="p-4"><button onclick="verify('${d.id}')" class="bg-blue-600 text-white px-2 py-1 rounded text-sm">Approve</button></td></tr>`;
            });
        }

        async function verify(id) {
            await supabaseClient.from('donations').update({is_verified: true}).eq('id', id);
            location.reload();
        }

        document.getElementById('cashForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cName').value;
            const amt = document.getElementById('cAmt').value;
            const place = document.getElementById('cPlace').value;
            const cat = document.getElementById('cCat').value;
            
            await supabaseClient.from('donations').insert([{donor_name: name, amount: amt, donor_place: place, initiative_name: cat, payment_mode: 'Cash', is_verified: true}]);
            window.location.href = `receipt.html?name=${name}&amt=${amt}&place=${place}&cat=${cat}&mode=Cash`;
        });
        fetchData();
    </script>
</body>
</html>
