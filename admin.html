<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Audit Dashboard | Banaras Kali Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body id="main-body" class="bg-gray-100 flex min-h-screen items-center justify-center">

    <div id="lock-screen" class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center border-t-4 border-[#5A0A0A]">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Sansthan Admin Gateway</h2>
        <p class="text-sm text-gray-500 mb-6">Restricted Access</p>
        <input type="password" id="passInput" placeholder="Enter Password" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-red-900">
        <button onclick="checkPassword()" class="w-full bg-[#5A0A0A] text-white font-bold py-3 rounded-lg hover:bg-red-900 transition">Unlock Dashboard</button>
        <p id="error-msg" class="text-red-500 font-bold mt-4 hidden">Incorrect Password. Access Denied.</p>
    </div>

    <div id="admin-content" class="hidden w-full min-h-screen">
        
        <div class="w-64 bg-[#5A0A0A] text-white p-6">
            <h2 class="text-xl font-bold mb-10 border-b border-red-900 pb-4">Sansthan Admin</h2>
            <div class="space-y-4">
                <button onclick="show('dashboard')" class="w-full text-left p-2 hover:bg-red-900 rounded">Dashboard</button>
                <button onclick="show('verification')" class="w-full text-left p-2 hover:bg-red-900 rounded">Verification Queue</button>
                <button onclick="show('cashEntry')" class="w-full text-left p-2 hover:bg-red-900 rounded">Manual Cash Entry</button>
                <button onclick="show('expenses')" class="w-full text-left p-2 hover:bg-red-900 rounded">Add Expense</button>
                <hr class="border-red-900 my-4">
                <button onclick="location.href='index.html'" class="w-full text-left p-2 text-red-300">Logout</button>
            </div>
        </div>

        <div class="flex-1 p-8">
            <div id="dashboard" class="page">
                <h1 class="text-2xl font-bold mb-6">Financial Overview</h1>
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500"><p class="text-xs text-gray-500 uppercase font-bold">Verified Income</p><h3 id="statReceived" class="text-2xl font-bold text-green-600">₹0</h3></div>
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-500"><p class="text-xs text-gray-500 uppercase font-bold">Pending Approval</p><h3 id="statPending" class="text-2xl font-bold text-yellow-600">₹0</h3></div>
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500"><p class="text-xs text-gray-500 uppercase font-bold">Total Expenses</p><h3 id="statExpenses" class="text-2xl font-bold text-red-600">₹0</h3></div>
                </div>
            </div>

            <div id="verification" class="page hidden">
                <h1 class="text-2xl font-bold mb-6">Pending Verifications</h1>
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="w-full text-left"><thead class="bg-gray-100"><tr><th class="p-4">Donor</th><th class="p-4">Amount</th><th class="p-4">Mode</th><th class="p-4">Action</th></tr></thead><tbody id="queueBody"></tbody></table>
                </div>
            </div>

            <div id="cashEntry" class="page hidden">
                <h1 class="text-2xl font-bold mb-6">Record Manual Cash</h1>
                <form id="cashForm" class="bg-white p-6 rounded-lg shadow w-full max-w-md space-y-4">
                    <input type="text" id="cName" placeholder="Donor Name" class="w-full p-2 border rounded" required>
                    <input type="text" id="cPlace" placeholder="Place" class="w-full p-2 border rounded" required>
                    <input type="number" id="cAmt" placeholder="Amount (₹)" class="w-full p-2 border rounded" required>
                    <input type="text" id="cPan" placeholder="Donor PAN (Optional for 80G)" class="w-full p-2 border rounded uppercase">
                    <select id="cCat" class="w-full p-2 border rounded">
                        <option>Gurukul</option>
                        <option>Gaushala</option>
                        <option>Kanyadaan</option>
                        <option>Temple</option>
                    </select>
                    <button type="submit" class="w-full bg-green-700 text-white p-2 rounded hover:bg-green-800 transition">Save & Print Receipt</button>
                </form>
            </div>

            <div id="expenses" class="page hidden">
                <h1 class="text-2xl font-bold mb-6">Add New Expense</h1>
                <form id="expenseForm" class="bg-white p-6 rounded-lg shadow w-full max-w-md space-y-4">
                    <select id="expCat" class="w-full p-2 border rounded">
                        <option value="Gurukul">Gurukul</option><option value="Gaushala">Gaushala</option><option value="Kanyadaan">Kanyadaan</option><option value="Temple">Temple Renovation</option>
                    </select>
                    <input type="number" id="expAmt" placeholder="Amount (₹)" class="w-full p-2 border rounded" required>
                    <input type="text" id="expDesc" placeholder="Description" class="w-full p-2 border rounded">
                    <button type="submit" class="w-full bg-[#5A0A0A] text-white p-2 rounded">Save Expense</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("passInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkPassword();
        });

        function checkPassword() {
            var pwd = document.getElementById("passInput").value;
            if (pwd === "Kalibadi@2026" || pwd === "kalibadi2026") {
                document.getElementById("lock-screen").classList.add("hidden");
                document.getElementById("admin-content").classList.remove("hidden");
                document.getElementById("admin-content").classList.add("flex");
                document.getElementById("main-body").classList.remove("items-center", "justify-center");
                init(); 
            } else {
                document.getElementById("error-msg").classList.remove("hidden");
                document.getElementById("passInput").value = "";
            }
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function init() {
            const { data: donations } = await supabaseClient.from('donations').select('*');
            const { data: expenses } = await supabaseClient.from('expenses').select('*');
            
            const verified = donations.filter(d => d.is_verified);
            const pending = donations.filter(d => !d.is_verified);
            const totalExp = expenses.reduce((a,b) => a + Number(b.amount), 0);
            
            document.getElementById('statReceived').innerText = "₹" + verified.reduce((a,b) => a + Number(b.amount), 0).toLocaleString('en-IN');
            document.getElementById('statPending').innerText = "₹" + pending.reduce((a,b) => a + Number(b.amount), 0).toLocaleString('en-IN');
            document.getElementById('statExpenses').innerText = "₹" + totalExp.toLocaleString('en-IN');

            const body = document.getElementById('queueBody');
            body.innerHTML = ''; 
            pending.forEach(d => {
                body.innerHTML += `<tr><td class="p-4">${d.donor_name}</td><td class="p-4">₹${d.amount}</td><td class="p-4">${d.payment_mode}</td><td class="p-4"><button onclick="verify('${d.id}')" class="bg-blue-600 text-white px-2 py-1 rounded text-sm hover:bg-blue-700">Approve</button></td></tr>`;
            });
        }

        async function verify(id) {
            await supabaseClient.from('donations').update({is_verified: true}).eq('id', id);
            location.reload();
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await supabaseClient.from('expenses').insert([{
                expense_category: document.getElementById('expCat').value,
                amount: document.getElementById('expAmt').value,
                description: document.getElementById('expDesc').value
            }]);
            alert("Expense Added Successfully"); 
            location.reload();
        });

        document.getElementById('cashForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cName').value;
            const amt = document.getElementById('cAmt').value;
            const place = document.getElementById('cPlace').value;
            const cat = document.getElementById('cCat').value;
            const pan = document.getElementById('cPan').value.toUpperCase();

            // 1. GENERATE RECEIPT NUMBER SECURELY HERE
            const dateObj = new Date();
            const year = dateObj.getFullYear().toString().slice(-2);
            const nextYear = (parseInt(year) + 1).toString();
            const monthDate = ("0" + (dateObj.getMonth() + 1)).slice(-2) + ("0" + dateObj.getDate()).slice(-2);
            const randomHex = Math.floor(Math.random() * 65535).toString(16).toUpperCase().padStart(4, '0');
            const generatedReceiptNo = `BKS/${year}-${nextYear}/${monthDate}-${randomHex}`;
            const formattedDate = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

            // 2. SAVE TO SUPABASE
            await supabaseClient.from('donations').insert([{
                donor_name: name, 
                amount: amt, 
                donor_place: place, 
                initiative_name: cat, 
                payment_mode: 'Cash', 
                is_verified: true,
                donor_pan: pan,
                receipt_no: generatedReceiptNo // Saved permanently in database
            }]);
            
            // 3. STORE SECURELY IN SESSION (Invisible to URL)
            const secureReceiptData = {
                name: name, amt: amt, place: place, cat: cat, mode: 'Cash', pan: pan,
                receiptNo: generatedReceiptNo, date: formattedDate
            };
            sessionStorage.setItem('secureReceipt', JSON.stringify(secureReceiptData));
            
            // 4. CLEAN REDIRECT (No URL parameters)
            window.location.href = 'receipt.html';
        });
    </script>
</body>
</html>
