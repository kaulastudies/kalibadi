<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sansthan Admin Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-[#5A0A0A]">Admin Audit Dashboard</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Verified Received</p>
                <h3 id="statReceived" class="text-2xl font-bold">₹0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-yellow-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Pending Approval</p>
                <h3 id="statPending" class="text-2xl font-bold">₹0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-red-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Total Expenses</p>
                <h3 id="statExpenses" class="text-2xl font-bold">₹0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Net Balance</p>
                <h3 id="statBalance" class="text-2xl font-bold">₹0</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <h2 class="font-bold text-xl mb-4">Verification Queue</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="border-b"><th class="p-2">Donor</th><th class="p-2">Amount</th><th class="p-2">Transaction #</th><th class="p-2">Action</th></tr></thead>
                    <tbody id="queueBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Password Protection
        const password = prompt("Enter Admin Password:");
        if (password !== "Kalibadi@2026") { window.location.href = "index.html"; }

        async function initDashboard() {
            // 1. Fetch Verified Donations
            const { data: verified } = await supabaseClient.from('donations').select('*').eq('is_verified', true);
            const sumReceived = verified.reduce((acc, curr) => acc + Number(curr.amount), 0);
            document.getElementById('statReceived').innerText = "₹" + sumReceived.toLocaleString();

            // 2. Fetch Pending
            const { data: pending } = await supabaseClient.from('donations').select('*').eq('is_verified', false);
            const sumPending = pending.reduce((acc, curr) => acc + Number(curr.amount), 0);
            document.getElementById('statPending').innerText = "₹" + sumPending.toLocaleString();

            // Populate Queue
            const tbody = document.getElementById('queueBody');
            pending.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2">${item.donor_name}</td>
                        <td class="p-2">₹${item.amount}</td>
                        <td class="p-2"><input type="text" id="tx-${item.id}" placeholder="Enter TX ID" class="border p-1 rounded"></td>
                        <td class="p-2"><button onclick="approve('${item.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm">Verify</button></td>
                    </tr>
                `;
            });
        }

        async function approve(id) {
            const txNumber = document.getElementById(`tx-${id}`).value;
            if(!txNumber) { alert("Please enter Transaction Number first"); return; }
            
            await supabaseClient.from('donations').update({ 
                is_verified: true, 
                transaction_number: txNumber,
                status: 'received'
            }).eq('id', id);
            
            alert("Donation Verified!");
            location.reload();
        }

        initDashboard();
    </script>
</body>
</html>
