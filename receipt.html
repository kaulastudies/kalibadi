<!DOCTYPE html>
<html>
<head>
    <title>Donation Receipt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">
    <div class="max-w-xl mx-auto border-4 border-double border-black p-8 text-center">
        <h1 class="text-3xl font-bold">BANARAS KALI BARI SANSTHAN</h1>
        <p class="mt-4 text-lg">OFFICIAL RECEIPT</p>
        <div class="mt-8 text-left space-y-4">
            <p><strong>Date:</strong> <span id="rDate"></span></p>
            <p><strong>Name:</strong> <span id="rName"></span></p>
            <p><strong>Amount:</strong> ₹<span id="rAmt"></span></p>
            <p><strong>Category:</strong> <span id="rCat"></span></p>
        </div>
        <div class="mt-20 flex justify-between">
            <p>Authorized Signatory</p>
            <p>Stamp</p>
        </div>
        <button class="mt-10 bg-black text-white px-6 py-2 print:hidden" onclick="window.print()">Print Receipt</button>
    </div>
    <script>
        const p = new URLSearchParams(location.search);
        document.getElementById('rDate').innerText = new Date().toLocaleDateString();
        document.getElementById('rName').innerText = p.get('name');
        document.getElementById('rAmt').innerText = p.get('amt');
        document.getElementById('rCat').innerText = p.get('cat');
    </script>
</body>
</html>
