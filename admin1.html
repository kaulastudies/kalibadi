<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 200px; border: 1px solid #ddd; border-radius: 4px; margin-right: 10px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>Institutional Access</h3>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button onclick="checkPass()">Enter</button>
        <p id="msg" style="color:red;"></p>
    </div>

    <script>
        function checkPass() {
            var pass = document.getElementById("passInput").value;
            // The password is 'Kashi2026' (you can change this)
            if (pass === "Kashi2026") {
                window.location.href = "dashboard_2026_xyz.html"; 
            } else {
                document.getElementById("msg").innerHTML = "Incorrect Protocol.";
            }
        }
    </script>
</body>
</html>
